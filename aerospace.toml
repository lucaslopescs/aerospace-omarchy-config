# AeroSpace config — Omarchy-style on macOS with a Hyper key
#
# Modifier convention:
#   - Caps Lock is remapped by Hyperkey.app to Cmd+Ctrl+Opt (3-modifier Hyper)
#   - Bindings written `cmd-alt-ctrl-<key>`      = Caps + <key>
#   - Bindings written `cmd-alt-ctrl-shift-<key>` = Caps + Shift + <key>
#   - Reload: Caps+Shift+; → esc, or `aerospace reload-config`

config-version = 2
start-at-login = true
after-startup-command = []

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["1","2","3","4","5","6","7","8","9"]

on-mode-changed = []

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 8
    inner.vertical   = 8
    outer.left       = 8
    outer.right      = 8
    outer.top        = 8
    outer.bottom     = 8

# Pin workspaces to monitors so AeroSpace never invents new ones (e.g. 10, 11)
# when monitors connect. Indices fall back left-to-right.
[workspace-to-monitor-force-assignment]
    1 = 1
    2 = 1
    3 = 1
    4 = [2, 1]
    5 = [2, 1]
    6 = [2, 1]
    7 = [3, 2, 1]
    8 = [3, 2, 1]
    9 = [3, 2, 1]

[mode.main.binding]
    cmd-alt-ctrl-slash = 'layout tiles horizontal vertical'
    cmd-alt-ctrl-comma = 'layout accordion horizontal vertical'

    cmd-alt-ctrl-left  = 'focus left'
    cmd-alt-ctrl-down  = 'focus down'
    cmd-alt-ctrl-up    = 'focus up'
    cmd-alt-ctrl-right = 'focus right'

    cmd-alt-ctrl-shift-left  = 'move left'
    cmd-alt-ctrl-shift-down  = 'move down'
    cmd-alt-ctrl-shift-up    = 'move up'
    cmd-alt-ctrl-shift-right = 'move right'

    cmd-alt-ctrl-minus = 'resize smart -50'
    cmd-alt-ctrl-equal = 'resize smart +50'

    cmd-alt-ctrl-shift-f = 'fullscreen'

    # Toggle the focused window between floating and tiling
    cmd-alt-ctrl-f = 'layout floating tiling'

    # Show keybindings cheatsheet (styled HTML in Chrome app window)
    cmd-alt-ctrl-k = 'exec-and-forget $HOME/.config/aerospace/show-cheatsheet.sh'

    # App launchers — launch if not running, focus if already open
    cmd-alt-ctrl-a       = 'exec-and-forget open -a "Claude"'
    cmd-alt-ctrl-shift-a = 'exec-and-forget open -a "ChatGPT"'
    cmd-alt-ctrl-b       = 'exec-and-forget open -a "Google Chrome"'
    cmd-alt-ctrl-c       = 'exec-and-forget open -a "Visual Studio Code"'
    cmd-alt-ctrl-t       = 'exec-and-forget open -a "Ghostty"'
    cmd-alt-ctrl-o       = 'exec-and-forget open -a "Obsidian"'
    cmd-alt-ctrl-d       = 'exec-and-forget open -a "Discord"'
    cmd-alt-ctrl-m       = 'exec-and-forget open -a "Messages"'
    cmd-alt-ctrl-n       = 'exec-and-forget open -a "Finder"'
    cmd-alt-ctrl-shift-n = 'exec-and-forget open -a "Notion"'

    # System Settings panels (Caps + Shift + letter)
    cmd-alt-ctrl-shift-w = 'exec-and-forget open "x-apple.systempreferences:com.apple.wifi-settings-extension"'
    cmd-alt-ctrl-shift-b = 'exec-and-forget open "x-apple.systempreferences:com.apple.BluetoothSettings"'
    cmd-alt-ctrl-shift-u = 'exec-and-forget open "x-apple.systempreferences:com.apple.Sound-Settings.extension"'
    cmd-alt-ctrl-shift-d = 'exec-and-forget open "x-apple.systempreferences:com.apple.Displays-Settings.extension"'

    # URL launchers — open in a new Chrome window (AppleScript forces a new
    # window even when Chrome is already running; `--new-window` gets ignored)
    cmd-alt-ctrl-x = '''exec-and-forget osascript -e 'tell application "Google Chrome"
        make new window
        set URL of active tab of front window to "https://x.com"
        activate
    end tell' '''
    cmd-alt-ctrl-g = '''exec-and-forget osascript -e 'tell application "Google Chrome"
        make new window
        set URL of active tab of front window to "https://mail.google.com"
        activate
    end tell' '''
    cmd-alt-ctrl-y = '''exec-and-forget osascript -e 'tell application "Google Chrome"
        make new window
        set URL of active tab of front window to "https://youtube.com"
        activate
    end tell' '''
    cmd-alt-ctrl-shift-g = '''exec-and-forget osascript -e 'tell application "Google Chrome"
        make new window
        set URL of active tab of front window to "https://github.com"
        activate
    end tell' '''

    cmd-alt-ctrl-1 = 'workspace 1'
    cmd-alt-ctrl-2 = 'workspace 2'
    cmd-alt-ctrl-3 = 'workspace 3'
    cmd-alt-ctrl-4 = 'workspace 4'
    cmd-alt-ctrl-5 = 'workspace 5'
    cmd-alt-ctrl-6 = 'workspace 6'
    cmd-alt-ctrl-7 = 'workspace 7'
    cmd-alt-ctrl-8 = 'workspace 8'
    cmd-alt-ctrl-9 = 'workspace 9'

    cmd-alt-ctrl-shift-1 = 'move-node-to-workspace 1'
    cmd-alt-ctrl-shift-2 = 'move-node-to-workspace 2'
    cmd-alt-ctrl-shift-3 = 'move-node-to-workspace 3'
    cmd-alt-ctrl-shift-4 = 'move-node-to-workspace 4'
    cmd-alt-ctrl-shift-5 = 'move-node-to-workspace 5'
    cmd-alt-ctrl-shift-6 = 'move-node-to-workspace 6'
    cmd-alt-ctrl-shift-7 = 'move-node-to-workspace 7'
    cmd-alt-ctrl-shift-8 = 'move-node-to-workspace 8'
    cmd-alt-ctrl-shift-9 = 'move-node-to-workspace 9'

    cmd-alt-ctrl-tab       = 'workspace-back-and-forth'
    cmd-alt-ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    cmd-alt-ctrl-shift-semicolon = 'mode service'

[mode.service.binding]
    esc       = ['reload-config', 'mode main']
    r         = ['flatten-workspace-tree', 'mode main']
    f         = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    cmd-alt-ctrl-shift-left  = ['join-with left',  'mode main']
    cmd-alt-ctrl-shift-down  = ['join-with down',  'mode main']
    cmd-alt-ctrl-shift-up    = ['join-with up',    'mode main']
    cmd-alt-ctrl-shift-right = ['join-with right', 'mode main']

